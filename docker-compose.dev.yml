services:
  db:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: ${PROJECT_NAME:-techdocllm}-backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - .:/app
      - uv_cache:/root/.cache/uv
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  uv_cache:
    name: ${PROJECT_NAME:-techdocllm}-uv-cache
