services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
    container_name: ${PROJECT_NAME:-techdocllm}-backend
    restart: always
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
