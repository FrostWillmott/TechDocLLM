name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python & UV
        uses: ./.github/actions/setup-python-uv

      - name: Run ruff check
        run: uv run ruff check app/ tests/

      - name: Run ruff format check
        run: uv run ruff format --check app/ tests/

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python & UV
        uses: ./.github/actions/setup-python-uv

      - name: Load environment from .env
        shell: bash
        run: |
          if [ -f .env ]; then
            # Export only variables we actually use in CI
            while IFS='=' read -r name value; do
              case "$name" in
                DATABASE_URL|CODECOV_TOKEN)
                  echo "$name=$value" >> "$GITHUB_ENV"
                  ;;
              esac
            done < <(grep -E '^(DATABASE_URL|CODECOV_TOKEN)=' .env || true)
          fi

      - name: Run tests (coverage)
        run: uv run pytest tests/ --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ env.CODECOV_TOKEN }}

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Load environment from .env
        shell: bash
        run: |
          if [ -f .env ]; then
            while IFS='=' read -r name value; do
              case "$name" in
                SNYK_TOKEN)
                  echo "$name=$value" >> "$GITHUB_ENV"
                  ;;
              esac
            done < <(grep -E '^SNYK_TOKEN=' .env || true)
          fi

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/python@master
        with:
          args: --severity-threshold=high

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: prod
          push: false
          tags: techdocllm:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
